name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ["17", "21", "25"]
    services:
      altertable:
        image: ghcr.io/altertable-ai/altertable-mock:latest
        ports:
          - 15000:15000
        env:
          ALTERTABLE_MOCK_USERS: testuser:testpass
        options: >-
          --health-cmd "exit 0"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 3
          --health-start-period 10s
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - name: Verify Maven project
        env:
          ALTERTABLE_MOCK_PORT: "15000"
        run: |
          if [ ! -f pom.xml ]; then
            echo "No Maven project is present yet; the SDK bootstrap will add one."
            exit 0
          fi
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error \
              --user testuser:testpass \
              --header 'Content-Type: application/json' \
              --data '{"statement":"SELECT 1"}' \
              http://localhost:15000/validate >/dev/null; then
              break
            fi
            if [ "$attempt" = 30 ]; then
              exit 1
            fi
            sleep 1
          done
          mvn --batch-mode --no-transfer-progress verify
